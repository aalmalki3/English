<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Touchstone ENG 101 – Beginner Assessment Tool</title>
    <script>
        (function() {
            const saved = localStorage.getItem('shfq-theme');
            if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            else if (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme', 'dark');
            else document.documentElement.setAttribute('data-theme', 'light');
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-peach: #fae8d4;
            --brand-apricot: #f2cdae;
            --brand-ice: #cde0e5;
            --brand-slate: #8f9ea6;
            --brand-charcoal: #333333;
            --brand-gold: #C9A84C;
            --brand-navy: #1E3A5F;
            --bg-page: #fdfcfb;
            --surface: rgba(255, 255, 255, 0.85);
            --surface-solid: #ffffff;
            --text-main: #333333;
            --text-muted: #5c6b73;
            --border-light: rgba(205, 224, 229, 0.5);
            --border-strong: rgba(143, 158, 166, 0.35);
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
        }
        [data-theme="dark"] {
            --bg-page: #1a1a1a;
            --surface: rgba(40, 40, 40, 0.88);
            --surface-solid: #2a2a2a;
            --text-main: #f0f0f0;
            --text-muted: #a0aab4;
            --border-light: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.14);
        }
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            font-size: 16px;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-page);
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 400;
            line-height: 1.7;
            min-height: 100vh;
            padding: 2rem 1rem;
            border-top: 6px solid;
            border-image: linear-gradient(to right, var(--brand-peach), var(--brand-apricot), var(--brand-ice), var(--brand-slate)) 1;
            position: relative;
            overflow-x: hidden;
        }
        .ambient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            z-index: -1;
            animation: float 22s infinite alternate;
        }
        .orb-1 { width: 480px;
            height: 480px;
            background: var(--brand-peach);
            top: -120px;
            right: -120px; }
        .orb-2 { width: 380px;
            height: 380px;
            background: var(--brand-ice);
            bottom: -100px;
            left: -100px;
            animation-delay: -7s; }
        .orb-3 { width: 260px;
            height: 260px;
            background: var(--brand-apricot);
            top: 45%;
            left: 40%;
            animation-delay: -14s; }
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(40px, -30px); } }
        @keyframes toastIn { from { opacity: 0;
                transform: translateY(20px); } to { opacity: 1;
                transform: translateY(0); } }
        @keyframes toastOut { from { opacity: 1;
                transform: translateY(0); } to { opacity: 0;
                transform: translateY(-10px); } }
        @keyframes pulse-dot { 0%,
        100% { opacity: 1;
                transform: scale(1); } 50% { opacity: 0.4;
                transform: scale(0.8); } }
        .btn { font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 0.7rem 1.5rem;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.2px; }
        .btn:active { transform: scale(0.96); }
        .btn:focus-visible { outline: 3px solid var(--brand-ice);
            outline-offset: 2px; }
        .btn::after { content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.3) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.15s; }
        .btn:active::after { opacity: 1; }
        .btn-primary { background: var(--brand-charcoal);
            color: white;
            box-shadow: 0 4px 12px rgba(143, 158, 166, 0.1); }
        .btn-primary:hover { background: #1a1a1a;
            box-shadow: 0 8px 28px rgba(143, 158, 166, 0.15);
            transform: translateY(-1px); }
        [data-theme="dark"] .btn-primary { background: var(--brand-gold);
            color: #1a1a1a; }
        [data-theme="dark"] .btn-primary:hover { background: #d4b04e; }
        .btn-secondary { background: transparent;
            color: var(--brand-slate);
            border: 2px solid var(--brand-slate); }
        .btn-secondary:hover { background: var(--brand-ice);
            border-color: var(--brand-charcoal);
            color: var(--brand-charcoal); }
        .btn-ghost { background: transparent;
            color: var(--text-muted);
            border: 2px solid transparent;
            padding: 0.5rem 0.9rem; }
        .btn-ghost:hover { background: var(--border-light);
            color: var(--text-main);
            border-color: var(--border-strong); }
        .card { background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 1.75rem;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            transition: all 0.3s; }
        .card:hover { box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
            border-color: var(--border-strong);
            transform: translateY(-2px); }
        .toast-container { position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            pointer-events: none; }
        .toast { padding: 0.85rem 1.4rem;
            border-radius: var(--radius-md);
            background: var(--surface-solid);
            border: 1px solid var(--border-strong);
            box-shadow: 0 8px 28px rgba(143, 158, 166, 0.15);
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-main);
            animation: toastIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275), toastOut 0.3s ease 2.5s forwards;
            pointer-events: auto; }
        .toast.success { border-left: 4px solid #10b981; }
        .toast.warning { border-left: 4px solid #f59e0b; }
        .toast.error { border-left: 4px solid #ef4444; }
        .progress-bar-track { height: 7px;
            background: var(--border-light);
            border-radius: 20px;
            overflow: hidden;
            width: 100%; }
        .progress-bar-fill { height: 100%;
            border-radius: 20px;
            background: linear-gradient(90deg, var(--brand-slate), var(--brand-charcoal));
            transition: width 0.5s; }
        .theme-toggle { width: 50px;
            height: 28px;
            border-radius: 28px;
            border: 2px solid var(--border-strong);
            background: var(--border-light);
            position: relative;
            cursor: pointer;
            transition: all 0.3s; }
        .theme-toggle::after { content: '';
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--brand-gold);
            position: absolute;
            top: 3px;
            left: 3px;
            transition: all 0.3s; }
        [data-theme="dark"] .theme-toggle::after { left: 25px;
            background: #fff; }
        .data-ribbon { background: var(--surface);
            border: 1px solid var(--border-light);
            padding: 0.65rem 1.75rem;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 1.5rem; }
        .container { max-width: 1100px;
            margin: 0 auto; }
        .header-row { display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem; }
        .page-content { max-height: 420px;
            overflow-y: auto;
            padding: 1.5rem;
            margin-bottom: 2rem;
            font-size: 0.95rem;
            line-height: 1.7;
            white-space: pre-wrap; }
        .question-list { display: flex;
            flex-direction: column;
            gap: 1.25rem; }
        .question-card-inner { display: flex;
            flex-direction: column;
            gap: 0.6rem; }
        .question-number { display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--brand-charcoal);
            color: white;
            font-weight: 700;
            font-size: 0.9rem;
            flex-shrink: 0; }
        [data-theme="dark"] .question-number { background: var(--brand-gold);
            color: #1a1a1a; }
        .tag { display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase; }
        .tag-grammar { background: rgba(250, 232, 212, 0.4);
            color: #8b6914; }
        .tag-vocabulary { background: rgba(205, 224, 229, 0.4);
            color: #1a5c3a; }
        .hint-options { display: none;
            margin-top: 0.4rem;
            gap: 0.5rem;
            flex-wrap: wrap; }
        .hint-options.show { display: flex; }
        .hint-option-btn { padding: 0.4rem 1rem;
            border-radius: var(--radius-sm);
            border: 2px solid var(--brand-apricot);
            background: rgba(250, 232, 212, 0.25);
            color: var(--text-main);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.15s; }
        .hint-option-btn:hover { background: var(--brand-apricot);
            color: #1a1a1a; }
        .answer-reveal { display: none; }
        .answer-reveal.show { display: block; }
        @media (max-width: 680px) { body { padding: 1rem 0.5rem; } }
    </style>
</head>
<body>
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>
    <div class="toast-container" id="toastContainer"></div>
    <div class="container">
        <div class="header-row">
            <h1>📝 Beginner English Assessment</h1>
            <div style="display:flex;align-items:center;gap:0.8rem;">
                <button class="btn btn-ghost" onclick="switchLanguage()" id="langBtn">🌍 English</button>
                <div class="theme-toggle" onclick="toggleTheme()"></div>
            </div>
        </div>
        <div class="data-ribbon"><span class="status-dot" style="width:10px;height:10px;border-radius:50%;background:#10b981;display:inline-block;animation:pulse-dot 2s infinite;"></span> <span id="ribbonText">Touchstone ENG 101 · Level 1 · Read, then fill in the blanks</span></div>

        <div class="controls-bar" style="display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center;margin-bottom:1.5rem;">
            <label style="font-weight:700;">📄 <span data-key="pageLabel">Page</span>:</label>
            <input type="number" id="pageInput" min="1" max="83" value="9" style="width:90px;padding:0.7rem;border-radius:8px;border:2px solid var(--border-strong);background:var(--surface-solid);color:var(--text-main);text-align:center;font-weight:600;">

        <div class="card page-info-card" style="margin-bottom:1.5rem;padding:1rem 1.5rem;border-left:6px solid var(--brand-ice);" id="pageInfo">
            <span data-key="enterPage">📌 Choose a page (1–83) and click Start.</span>

        <div class="card page-content" id="pageContentDisplay"></div>

        <h2 style="font-size:1.5rem;font-weight:700;margin:1.5rem 0 0.75rem;" data-key="questionsTitle">📋 Practice Questions</h2>
        <div class="question-list" id="questionsContainer"></div>

        <div class="card results-panel" id="resultsPanel" style="display:none;margin-top:2rem;text-align:center;">
            <h2 data-key="yourScore">📊 Your Score</h2>
            <div style="font-size:3rem;font-weight:800;" id="scoreDisplay">0%</div>

            document.documentElement.lang = currentLang === 'ar' ? 'ar' : 'en';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.querySelectorAll('[data-key]').forEach(el => { const k = el.getAttribute('data-key'); if (t9n[currentLang][k]) el.textContent = t9n[currentLang][k]; });

            document.getElementById('langBtn').textContent = t('switchTo') || (currentLang==='ar'?'🌍 English':'🕌 العربية');

        function switchLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            localStorage.setItem('shfq-lang', currentLang);
            updateStaticTexts();
            if (currentQuestions.length) renderQuestions(currentQuestions);

        function toggleTheme() {
            const cur = document.documentElement.getAttribute('data-theme');
            const next = cur === 'dark' ? 'light' : 'dark';

            localStorage.setItem('shfq-theme', next);

            c.appendChild(t);
            setTimeout(() => t.remove(), 3000);

        // ========== QUESTION GENERATOR ==========
        let currentQuestions = [];
        function generateQuestionsForPage(pageNum) {
            const page = textbookDB[pageNum];
            if (!page) return [];
            const qs = [];
            const ft = page.fullText.toLowerCase();
            const snip = (kws, n=2) => {
                const lines = page.fullText.split('\n').filter(l=>l.trim().length>6);
                for (const k of kws) { const f = lines.find(l => l.toLowerCase().includes(k.toLowerCase())); if (f) return f.trim(); }
                return lines.slice(0,n).join(' ').trim();
            };
            const add = (text, context, hintOptions, answer, type='grammar') => {
                qs.push({ id: qs.length+1, text, context, hintOptions, answer, type });
            };
            // helper to create options: correct + 2 plausible wrong
            const mc = (correct, wrongs) => [correct, ...wrongs];

            if (ft.includes("i'm")||ft.includes("i am")) add('Complete: "Hello. _____ Chris." (I am)', snip(["I'm","Hello"]), mc("I'm", ["I","You're"]), "I'm",'grammar');
            if (ft.includes("you're")||ft.includes("you are")) add('Complete: "_____ in Room B." (You are)', snip(["You're","Room"]), mc("You're", ["You","She's"]), "You're",'grammar');
            if (ft.includes("he's")||ft.includes("he is")) add('Rewrite: "Jun is at work." → "_____ at work."', snip(["He's","Jun"]), mc("He's", ["He","She's"]), "He's",'grammar');
            if (ft.includes("she's")||ft.includes("she is")) add('Complete: "Laura is sick." → "_____ sick."', snip(["She's","sick"]), mc("She's", ["She","He's"]), "She's",'grammar');
            if (ft.includes("they're")||ft.includes("they are")) add('Rewrite: "Kim and Phong are late." → "_____ late."', snip(["They're","late"]), mc("They're", ["They","We're"]), "They're",'grammar');
            if (ft.includes("we're")||ft.includes("we are")) add('Complete: "_____ in the same class." (We are)', snip(["We're","same class"]), mc("We're", ["We","They're"]), "We're",'grammar');
            if (ft.includes("are you")&&ft.includes("?")) add('Question: "_____ you here for English class?"', snip(["Are you","class"]), mc("Are", ["Is","Am"]), "Are",'grammar');
            if (ft.includes("is he")||ft.includes("is she")) add('Question: "_____ she sick?"', snip(["Is she","sick"]), mc("Is", ["Are","Am"]), "Is",'grammar');
            if (ft.includes("are they")) add('Complete: "_____ they in the cafeteria?"', snip(["Are they","cafeteria"]), mc("Are", ["Is","Am"]), "Are",'grammar');
            if (ft.includes("what's")||ft.includes("what is")) add('Complete: "_____ your name?" (Contraction)', snip(["What's","name"]), mc("What's", ["What","It's"]), "What's",'grammar');
            if (ft.includes("it's")||ft.includes("it is")) add('Complete: "_____ 646-555-3048." (It is)', snip(["It's","phone"]), mc("It's", ["It","What's"]), "It's",'grammar');
            if (ft.includes("don't")||ft.includes("do not")) add('Negative: "I _____ eat lunch." (do not)', snip(["don't","eat"]), mc("don't", ["do","doesn't"]), "don't",'grammar');
            if (ft.includes("doesn't")||ft.includes("does not")) add('Negative: "She _____ watch TV." (does not)', snip(["doesn't","watch"]), mc("doesn't", ["don't","does"]), "doesn't",'grammar');
            if (ft.includes("do you")&&ft.includes("?")) add('Complete: "_____ you play sports?"', snip(["Do you","play"]), mc("Do", ["Does","Is"]), "Do",'grammar');
            if (ft.includes("does")&&(ft.includes("mother")||ft.includes("she"))) add('Complete: "_____ your mother work?"', snip(["Does","mother"]), mc("Does", ["Do","Is"]), "Does",'grammar');
            if (ft.includes("his ")&&ft.includes("movie")) add('Complete: "Sean Penn is an actor. _____ movies are very good."', snip(["his","movie"]), mc("His", ["Her","Their"]), "His",'grammar');
            if (ft.includes("her ")&&ft.includes("voice")) add('Complete: "Norah Jones is a singer. _____ voice is amazing."', snip(["her","voice"]), mc("Her", ["His","Their"]), "Her",'grammar');
            if (ft.includes("their ")&&ft.includes("match")) add('Complete: "The Williams sisters. _____ matches are exciting."', snip(["their","matches"]), mc("Their", ["His","Her"]), "Their",'grammar');
            if (ft.includes("how about you")) add('How to return the question? "I\'m fine. _____?"', snip(["How about you"]), mc("How about you?", ["How are you?","What about you?"]), "How about you?",'grammar');
            if (ft.includes("where's")||ft.includes("where is")) add('Complete: "_____ the VCR?" (Where is)', snip(["Where's","VCR"]), mc("Where's", ["Where","What's"]), "Where's",'grammar');
            if (ft.includes("this ")&&ft.includes("mp3")) add('Complete: "_____ is an MP3 player." (This/These)', snip(["MP3"]), mc("This", ["These","That"]), "This",'grammar');
            if (ft.includes("an ")&&ft.includes("mp3")) add('Article: "This is _____ MP3 player." (a/an)', snip(["MP3"]), mc("an", ["a","the"]), "an",'grammar');
            if (ft.includes("well,")||ft.includes("well ")) add('Word to start a thinking answer: "_____, I\'m from Chicago."', snip(["Well","Chicago"]), mc("Well", ["So","But"]), "Well",'grammar');

            // vocabulary based on page topic
            if (ft.includes("good morning")) add('Greeting for the morning?', snip(["Good morning"]), mc("Good morning", ["Good night","Good evening"]), "Good morning",'vocabulary');
            if (ft.includes("good night")) add('Say before bed?', snip(["Good night"]), mc("Good night", ["Good morning","Good evening"]), "Good night",'vocabulary');
            if (ft.includes("nice to meet you")) add('First meeting expression?', snip(["Nice to meet you"]), mc("Nice to meet you", ["How are you?","See you"]), "Nice to meet you",'vocabulary');
            if (ft.includes("see you")) add('Informal goodbye?', snip(["See you"]), mc("See you", ["Good morning","Hello"]), "See you",'vocabulary');
            if (ft.includes("you're welcome")) add('Response to "Thank you"?', snip(["You're welcome"]), mc("You're welcome", ["That's OK","Sorry"]), "You're welcome",'vocabulary');
            if (ft.includes("that's ok")) add('Response to "I\'m sorry"?', snip(["That's OK"]), mc("That's OK", ["You're welcome","Thanks"]), "That's OK",'vocabulary');
            if (ft.includes("last name")) add('Family name is called?', snip(["last name"]), mc("last name", ["first name","middle name"]), "last name",'vocabulary');
            if (ft.includes("spell")) add('Ask for letters?', snip(["How do you spell"]), mc("How do you spell", ["What's your name?","How are you?"]), "How do you spell",'vocabulary');
            if (ft.includes("board")) add('Teacher writes on?', snip(["board"]), mc("board", ["desk","wall"]), "board",'vocabulary');
            if (ft.includes("wastebasket")) add('Paper trash container?', snip(["wastebasket"]), mc("wastebasket", ["closet","desk"]), "wastebasket",'vocabulary');
            if (ft.includes("cafeteria")) add('Where students eat?', snip(["cafeteria"]), mc("cafeteria", ["library","gym"]), "cafeteria",'vocabulary');
            if (ft.includes("singer")) add('Person who sings?', snip(["singer"]), mc("singer", ["actor","artist"]), "singer",'vocabulary');
            if (ft.includes("outgoing")) add('Adjective for a social person?', snip(["outgoing"]), mc("outgoing", ["shy","lazy"]), "outgoing",'vocabulary');
            if (ft.includes("grandmother")) add('Your mother\'s mother?', snip(["grandmother"]), mc("grandmother", ["grandfather","sister"]), "grandmother",'vocabulary');
            if (ft.includes("breakfast")) add('First meal of the day?', snip(["breakfast"]), mc("breakfast", ["lunch","dinner"]), "breakfast",'vocabulary');
            if (ft.includes("homework")) add('School work at home?', snip(["homework"]), mc("homework", ["housework","classwork"]), "homework",'vocabulary');
            if (ft.includes("really?")) add('One-word to show surprise?', snip(["Really?"]), mc("Really?", ["Yes","No"]), "Really?",'vocabulary');
            if (ft.includes("90,000")) add('How many hours does an American work in a lifetime?', snip(["90,000"]), mc("90,000", ["9,000","900,000"]), "90,000",'vocabulary');

            // if still too few, add a generic fill from the first sentence
            if (qs.length < 3) {
                const firstLine = page.fullText.split('\n').find(l=>l.trim().length>10)||'';
                const words = firstLine.split(/\s+/).filter(w=>w.length>3);
                if (words.length>0) {
                    const w = words[0];
                    add(`The page begins with: "${firstLine.split(' ').slice(0,2).join(' ')} _____ ..."`, firstLine, mc(w, [words[1]||'','the']), w,'vocabulary');
                }
            }
            return qs.slice(0,8);
        }

        // ========== RENDER QUESTIONS ==========
        function renderQuestions(questions) {
            const container = document.getElementById('questionsContainer');
            let html = '';
            questions.forEach((q,i) => {
                const tagClass = q.type==='grammar'?'tag-grammar':'tag-vocabulary';
                html += `<div class="card question-card-inner" id="qcard-${i}">
                    <div class="question-header" style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">
                        <span class="question-number">${i+1}</span>
                        <span style="font-weight:600;flex:1;">${q.text}</span>
                        <span class="tag ${tagClass}">${t(q.type)}</span>
                    </div>
                    ${q.context?`<div style="background:rgba(143,158,166,0.07);border:1px dashed var(--border-strong);padding:0.6rem 1rem;border-radius:8px;font-size:0.88rem;color:var(--text-muted);white-space:pre-wrap;">📖 ${q.context}</div>`:''}
                    <div style="display:flex;flex-wrap:wrap;gap:0.5rem;align-items:center;">
                        <input type="text" id="answer-${i}" placeholder="Type answer..." onkeydown="if(event.key==='Enter')checkAnswer(${i})" style="flex:1;min-width:160px;padding:0.6rem;border:2px solid var(--border-strong);border-radius:8px;background:var(--surface-solid);color:var(--text-main);font-family:'Courier New',monospace;">
                        <button class="btn btn-ghost" onclick="toggleHintOptions(${i})">💬 ${t('hint')}</button>
                        <button class="btn btn-secondary" onclick="checkAnswer(${i})">✓ ${t('check')}</button>
                    </div>
                    <div class="hint-options" id="hintOptions-${i}">
                        ${q.hintOptions.map(opt=>`<button class="hint-option-btn" onclick="fillAnswer(${i},'${opt.replace(/'/g,"\\'")}')">${opt}</button>`).join('')}
                    </div>
                    <div class="answer-reveal" id="correctAnswer-${i}" style="background:rgba(16,185,129,0.08);border:1px solid #10b981;padding:0.6rem;border-radius:8px;font-weight:600;color:#10b981;margin-top:0.4rem;">✅ ${q.answer}</div>
                    <div id="feedback-${i}" style="font-weight:600;margin-top:0.3rem;"></div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function toggleHintOptions(i) {
            const el = document.getElementById(`hintOptions-${i}`);
            el.classList.toggle('show');
        }
        function fillAnswer(i, value) {
            document.getElementById(`answer-${i}`).value = value;
            document.getElementById(`hintOptions-${i}`).classList.remove('show');
        }
        function showAnswer(i) {
            document.getElementById(`correctAnswer-${i}`).classList.add('show');
        }
        function checkAnswer(i) {
            const inp = document.getElementById(`answer-${i}`);
            const fb = document.getElementById(`feedback-${i}`);
            const card = document.getElementById(`qcard-${i}`);
            const ua = inp.value.trim().toLowerCase();
            if (!ua) { fb.textContent = t('typeAnswer');
                fb.style.color = '#ef4444'; return; }
            const ca = currentQuestions[i].answer.toLowerCase().split(',').map(s=>s.trim());
            let ok = false;
            for (const v of ca) { if (ua===v||(v.length>3&&ua.includes(v))||(ua.length>3&&v.includes(ua))) { ok=true; break; } }
            if (ok) {
                fb.textContent = t('correct');
                fb.style.color = '#10b981';
                inp.classList.add('correct-input');
                inp.classList.remove('incorrect-input');
                card.style.borderColor = '#10b981';
            } else {
                fb.textContent = t('incorrect');
                fb.style.color = '#ef4444';
                inp.classList.add('incorrect-input');
                inp.classList.remove('correct-input');
                card.style.borderColor = '#ef4444';
            }
            updateScore();
        }
        function checkAllAnswers() { currentQuestions.forEach((_,i)=>{ const inp=document.getElementById(`answer-${i}`); if(inp&&inp.value.trim())checkAnswer(i); }); }
        function showAllAnswers() { currentQuestions.forEach((_,i)=>showAnswer(i)); }
        function updateScore() {
            let correct = 0;
            const total = currentQuestions.length;
            currentQuestions.forEach((_,i)=>{ const fb=document.getElementById(`feedback-${i}`); if(fb&&fb.style.color==='rgb(16, 185, 129)')correct++; });
            const pct = total>0?Math.round((correct/total)*100):0;
            document.getElementById('scoreDisplay').textContent = pct+'%';
            document.getElementById('progressFill').style.width = pct+'%';
            let stars = '';
            if(pct===100)stars='⭐⭐⭐⭐⭐';
            else if(pct>=80)stars='⭐⭐⭐⭐';
            else if(pct>=60)stars='⭐⭐⭐';
            else if(pct>=40)stars='⭐⭐';
            else if(pct>0)stars='⭐';
            document.getElementById('starsDisplay').textContent=stars;
            const msgs={100:'perfect',75:'great',50:'good'};
            const m = pct>=100?'perfect':pct>=75?'great':pct>=50?'good':pct>0?'keep':'';
            document.getElementById('scoreMessage').textContent = m?t(m):'';
        }

        function generateAssessment() {
            const pn = parseInt(document.getElementById('pageInput').value);
            if (isNaN(pn)||pn<1||pn>83) { showToast('Invalid page','warning'); return; }
            const page = textbookDB[pn];
            currentPage = page;
            currentQuestions = generateQuestionsForPage(pn);
            document.getElementById('resultsPanel').style.display='none';
            document.getElementById('pageInfo').innerHTML = `📄 <strong>Page ${pn}</strong> | ${page.section}`;
            document.getElementById('pageContentDisplay').innerHTML = page.fullText.replace(/\n/g,'<br>');
            document.getElementById('pageContentDisplay').scrollTop = 0;
            if (currentQuestions.length===0) {
                document.getElementById('questionsContainer').innerHTML = '<p>No questions for this page.</p>';
            } else {
                renderQuestions(currentQuestions);
                document.getElementById('resultsPanel').style.display='block';
            }
            document.getElementById('pageContentDisplay').scrollIntoView({behavior:'smooth'});
        }
        function randomPage() { document.getElementById('pageInput').value = Math.floor(Math.random()*83)+1;
            generateAssessment(); }
        function resetAll() {
            document.getElementById('pageInput').value='9';
            document.getElementById('questionsContainer').innerHTML='';
            document.getElementById('pageContentDisplay').innerHTML='';
            document.getElementById('resultsPanel').style.display='none';
            document.getElementById('scoreDisplay').textContent='0%';
            document.getElementById('progressFill').style.width='0%';
            currentQuestions=[];
        }
        updateStaticTexts();
        window.addEventListener('DOMContentLoaded', ()=>{ generateAssessment(); });
    </script>
</body>
</html>
