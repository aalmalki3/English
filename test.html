<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Touchstone ENG 101 – Smart Assessment Tool</title>
    <script>
        (function() {
            const saved = localStorage.getItem('shfq-theme');
            if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            else if (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme', 'dark');
            else document.documentElement.setAttribute('data-theme', 'light');
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-peach: #fae8d4;
            --brand-apricot: #f2cdae;
            --brand-ice: #cde0e5;
            --brand-slate: #8f9ea6;
            --brand-charcoal: #333;
            --brand-gold: #C9A84C;
            --brand-navy: #1E3A5F;
            --bg-page: #fdfcfb;
            --surface: rgba(255, 255, 255, 0.88);
            --surface-solid: #fff;
            --text-main: #333;
            --text-muted: #5c6b73;
            --border-light: rgba(205, 224, 229, 0.5);
            --border-strong: rgba(143, 158, 166, 0.35);
            --radius-sm: 10px;
            --radius-md: 18px;
            --radius-lg: 26px;
            --radius-xl: 34px;
            --easy: #10b981;
            --medium: #f59e0b;
            --hard: #ef4444;
        }
        [data-theme="dark"] {
            --bg-page: #18181b;
            --surface: rgba(35, 35, 40, 0.9);
            --surface-solid: #252528;
            --text-main: #f0f0f0;
            --text-muted: #a0aab4;
            --border-light: rgba(255, 255, 255, 0.07);
            --border-strong: rgba(255, 255, 255, 0.12);
        }
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-page);
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 400;
            line-height: 1.7;
            min-height: 100vh;
            padding: 2rem 1rem 4rem;
            border-top: 6px solid;
            border-image: linear-gradient(to right, var(--brand-peach), var(--brand-apricot), var(--brand-ice), var(--brand-slate)) 1;
            position: relative;
            overflow-x: hidden;
            transition: background 0.4s, color 0.4s;
        }
        .ambient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            animation: float 20s infinite alternate;
            pointer-events: none;
            opacity: 0.55;
        }
        .orb-1 { width: 500px;
            height: 500px;
            background: var(--brand-peach);
            top: -140px;
            right: -140px;
            animation-delay: 0s; }
        .orb-2 { width: 400px;
            height: 400px;
            background: var(--brand-ice);
            bottom: -120px;
            left: -120px;
            animation-delay: -8s; }
        .orb-3 { width: 280px;
            height: 280px;
            background: var(--brand-apricot);
            top: 50%;
            left: 35%;
            animation-delay: -15s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(35px, -25px) scale(1.04); } }
        @keyframes fadeUp { from { opacity: 0;
                transform: translateY(24px); } to { opacity: 1;
                transform: translateY(0); } }
        @keyframes pulse-dot { 0%,
        100% { opacity: 1;
                transform: scale(1); } 50% { opacity: 0.35;
                transform: scale(0.75); } }
        @keyframes toastIn { from { opacity: 0;
                transform: translateY(16px); } to { opacity: 1;
                transform: translateY(0); } }
        @keyframes toastOut { to { opacity: 0;
                transform: translateY(-12px); } }
        @keyframes popIn { 0% { transform: scale(0.85);
                opacity: 0; } 60% { transform: scale(1.04); } 100% { transform: scale(1);
                opacity: 1; } }
        @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
        .btn {
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.65rem 1.4rem;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            transition: all 0.18s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.15px;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            white-space: nowrap;
        }
        .btn:active { transform: scale(0.95); }
        .btn:focus-visible { outline: 3px solid var(--brand-ice);
            outline-offset: 3px; }
        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.28) 0%, transparent 65%);
            opacity: 0;
            transition: opacity 0.18s;
        }
        .btn:active::after { opacity: 1; }
        .btn-primary { background: var(--brand-charcoal);
            color: #fff;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08); }
        .btn-primary:hover { background: #1a1a1a;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.14);
            transform: translateY(-1px); }
        [data-theme="dark"] .btn-primary { background: var(--brand-gold);
            color: #1a1a1a;
            box-shadow: 0 4px 18px rgba(201, 168, 76, 0.2); }
        [data-theme="dark"] .btn-primary:hover { background: #d4b04e;
            box-shadow: 0 8px 28px rgba(201, 168, 76, 0.3); }
        .btn-secondary { background: transparent;
            color: var(--text-main);
            border: 2px solid var(--border-strong); }
        .btn-secondary:hover { background: var(--border-light);
            border-color: var(--brand-slate); }
        .btn-ghost { background: transparent;
            color: var(--text-muted);
            border: 2px solid transparent;
            padding: 0.45rem 0.8rem; }
        .btn-ghost:hover { background: var(--border-light);
            color: var(--text-main); }
        .btn-easy { background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1.5px solid rgba(16, 185, 129, 0.3);
            font-size: 0.8rem;
            padding: 0.35rem 0.9rem; }
        .btn-medium { background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            border: 1.5px solid rgba(245, 158, 11, 0.3);
            font-size: 0.8rem;
            padding: 0.35rem 0.9rem; }
        .btn-hard { background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1.5px solid rgba(239, 68, 68, 0.3);
            font-size: 0.8rem;
            padding: 0.35rem 0.9rem; }
        .card {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 1.6rem;
            box-shadow: 0 3px 16px rgba(0, 0, 0, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.07);
            border-color: var(--border-strong);
            transform: translateY(-2px); }
        .toast-container { position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            pointer-events: none; }
        .toast { padding: 0.8rem 1.5rem;
            border-radius: var(--radius-md);
            background: var(--surface-solid);
            border: 1px solid var(--border-strong);
            box-shadow: 0 10px 32px rgba(0, 0, 0, 0.14);
            font-weight: 600;
            font-size: 0.88rem;
            color: var(--text-main);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.4s forwards;
            pointer-events: auto; }
        .toast.success { border-left: 4px solid #10b981; }
        .toast.warning { border-left: 4px solid #f59e0b; }
        .toast.error { border-left: 4px solid #ef4444; }
        .progress-bar-track { height: 8px;
            background: var(--border-light);
            border-radius: 20px;
            overflow: hidden;
            width: 100%; }
        .progress-bar-fill { height: 100%;
            border-radius: 20px;
            background: linear-gradient(90deg, var(--brand-slate), var(--brand-charcoal));
            transition: width 0.55s cubic-bezier(0.4, 0, 0.2, 1); }
        [data-theme="dark"] .progress-bar-fill { background: linear-gradient(90deg, var(--brand-gold), #d4b04e); }
        .theme-toggle { width: 52px;
            height: 29px;
            border-radius: 29px;
            border: 2px solid var(--border-strong);
            background: var(--border-light);
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0; }
        .theme-toggle::after { content: '';
            width: 19px;
            height: 19px;
            border-radius: 50%;
            background: var(--brand-gold);
            position: absolute;
            top: 3px;
            left: 4px;
            transition: all 0.3s; }
        [data-theme="dark"] .theme-toggle::after { left: 25px;
            background: #fff; }
        .container { max-width: 1140px;
            margin: 0 auto; }
        .header-row { display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.8rem; }
        .header-row h1 { font-size: clamp(1.7rem, 5vw, 2.4rem);
            font-weight: 800;
            letter-spacing: -0.4px; }
        .controls-card { display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.5rem; }
        .controls-card input[type="number"] { width: 85px;
            padding: 0.65rem 0.9rem;
            border: 2px solid var(--border-strong);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            text-align: center;
            font-weight: 700;
            font-family: inherit;
            background: var(--surface-solid);
            color: var(--text-main);
            transition: all 0.2s; }
        .controls-card input[type="number"]:focus { outline: none;
            border-color: var(--brand-slate);
            box-shadow: 0 0 0 4px rgba(143, 158, 166, 0.12); }
        .page-content-display { max-height: 380px;
            overflow-y: auto;
            padding: 1.4rem;
            margin-bottom: 1.8rem;
            font-size: 0.93rem;
            line-height: 1.75;
            white-space: pre-wrap;
            background: var(--surface-solid);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-light); }
        .section-title { font-size: 1.5rem;
            font-weight: 700;
            margin: 2rem 0 0.6rem;
            display: flex;
            align-items: center;
            gap: 0.5rem; }
        .difficulty-badge { display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.4px;
            text-transform: uppercase; }
        .badge-easy { background: rgba(16, 185, 129, 0.12);
            color: #10b981; }
        .badge-medium { background: rgba(245, 158, 11, 0.12);
            color: #f59e0b; }
        .badge-hard { background: rgba(239, 68, 68, 0.12);
            color: #ef4444; }
        .question-card { animation: fadeUp 0.4s ease both; }
        .question-card:nth-child(1) { animation-delay: 0s; }
        .question-card:nth-child(2) { animation-delay: 0.08s; }
        .question-card:nth-child(3) { animation-delay: 0.16s; }
        .question-card:nth-child(4) { animation-delay: 0.22s; }
        .question-card:nth-child(5) { animation-delay: 0.28s; }
        .question-card:nth-child(6) { animation-delay: 0.34s; }
        .question-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-weight: 800;
            font-size: 0.85rem;
            flex-shrink: 0;
            color: #fff;
            background: var(--brand-charcoal);
        }
        [data-theme="dark"] .question-number { background: var(--brand-gold);
            color: #1a1a1a; }
        .context-snippet { background: rgba(143, 158, 166, 0.06);
            border: 1px dashed var(--border-strong);
            border-radius: var(--radius-sm);
            padding: 0.7rem 1rem;
            font-size: 0.86rem;
            color: var(--text-muted);
            white-space: pre-wrap;
            margin: 0.5rem 0; }
        .answer-input { flex: 1;
            min-width: 160px;
            padding: 0.6rem 0.9rem;
            border: 2px solid var(--border-strong);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-family: 'Courier New', monospace;
            background: var(--surface-solid);
            color: var(--text-main);
            transition: all 0.2s; }
        .answer-input:focus { outline: none;
            border-color: var(--brand-slate);
            box-shadow: 0 0 0 4px rgba(143, 158, 166, 0.08); }
        .answer-input.correct { border-color: #10b981 !important;
            background: rgba(16, 185, 129, 0.04) !important; }
        .answer-input.incorrect { border-color: #ef4444 !important;
            background: rgba(239, 68, 68, 0.03) !important; }
        .hint-chips { display: none;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem; }
        .hint-chips.show { display: flex; }
        .hint-chip { padding: 0.4rem 1rem;
            border-radius: 30px;
            border: 2px solid var(--brand-ice);
            background: rgba(205, 224, 229, 0.15);
            color: var(--text-main);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.15s; }
        .hint-chip:hover { background: var(--brand-ice);
            color: #1a1a1a;
            border-color: var(--brand-slate);
            transform: scale(1.03); }
        .answer-reveal { display: none;
            padding: 0.6rem 1rem;
            border-radius: var(--radius-sm);
            background: rgba(16, 185, 129, 0.07);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            font-weight: 700;
            margin-top: 0.4rem;
            animation: popIn 0.3s ease; }
        .answer-reveal.show { display: block; }
        .feedback-msg { font-weight: 700;
            font-size: 0.85rem;
            margin-top: 0.3rem;
            display: none; }
        .feedback-msg.show { display: block; }
        .feedback-msg.correct { color: #10b981; }
        .feedback-msg.incorrect { color: #ef4444; }
        .results-panel { margin-top: 2rem;
            text-align: center;
            animation: fadeUp 0.5s ease; }
        .score-ring { width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 6px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.8rem;
            font-size: 2rem;
            font-weight: 900;
            transition: border-color 0.5s; }
        .page-nav { display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap; }
        @media (max-width: 680px) {
            body { padding: 1rem 0.6rem 3rem; }
            .controls-card { flex-direction: column;
                align-items: stretch; }
            .page-content-display { max-height: 260px;
                font-size: 0.85rem; }
            .header-row h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>
    <div class="toast-container" id="toastContainer"></div>
    <div class="container">
        <div class="header-row">
            <h1>📝 Smart Assessment</h1>
            <div style="display:flex;align-items:center;gap:0.7rem;">
                <button class="btn btn-ghost" onclick="switchLanguage()" id="langBtn">🌍 English</button>
                <div class="theme-toggle" onclick="toggleTheme()"></div>
            </div>
        </div>

        <div class="card controls-card">
            <label style="font-weight:700;white-space:nowrap;">📄 Page:</label>
            <input type="number" id="pageInput" min="1" max="83" value="9" placeholder="1–83">
            <button class="btn btn-primary" onclick="navigateToPage()">🔍 Go</button>
            <button class="btn btn-secondary" onclick="randomLessonPage()">🎲 Random</button>
            <div class="page-nav">
                <button class="btn btn-ghost" onclick="prevLessonPage()" title="Previous lesson">◀ Prev</button>
                <button class="btn btn-ghost" onclick="nextLessonPage()" title="Next lesson">Next ▶</button>
            </div>
            <span id="pageStatus" style="font-size:0.82rem;color:var(--text-muted);margin-left:auto;"></span>
        </div>

        <div class="card page-content-display" id="pageContentDisplay">
            <p style="text-align:center;color:var(--text-muted);padding:3rem 1rem;">📖 <strong>Pick a page to start</strong><br><small>Lesson text appears here — then answer below</small></p>
        </div>

        <div id="questionsArea">
            <div class="section-title">📋 Questions <span id="difficultySummary" style="font-size:0.8rem;font-weight:500;color:var(--text-muted);"></span></div>
            <div id="questionsContainer" style="display:flex;flex-direction:column;gap:1rem;"></div>
        </div>

        <div class="card results-panel" id="resultsPanel" style="display:none;">
            <h3 style="margin-bottom:0.5rem;">📊 Your Score</h3>
            <div class="score-ring" id="scoreRing">0%</div>
            <div id="starsDisplay" style="font-size:1.4rem;margin-bottom:0.5rem;"></div>
            <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill" style="width:0%;"></div></div>
            <p id="scoreMessage" style="color:var(--text-muted);margin:0.6rem 0;"></p>
            <div style="display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;">
                <button class="btn btn-primary" onclick="checkAllAnswers()">✅ Check All</button>
                <button class="btn btn-secondary" onclick="showAllAnswers()">👁️ Reveal All</button>
                <button class="btn btn-ghost" onclick="resetAnswers()">🔄 Retry</button>
            </div>
        </div>
    </div>

    <script>
        const t9n = {
            ar: {
                hint: '💬 خيارات',
                check: '✓ تحقق',
                correct: '✅ صحيح!',
                incorrect: '❌ حاول مجدداً',
                typeAnswer: '❌ اكتب إجابة',
                perfect: '🏆 ممتاز!',
                great: '👍 رائع!',
                good: '📖 جيد',
                keep: '📚 حاول مجدداً',
                easy: 'سهل',
                medium: 'متوسط',
                hard: 'صعب',
                allLevels: 'كل المستويات',
                prev: '◀ السابق',
                next: 'التالي ▶',
                go: '🔍 اذهب',
                random: '🎲 عشوائي',
                lessonPage: 'صفحة الدرس',
                redirected: '🔀 تم التوجيه إلى'
            },
            en: {
                hint: '💬 Options',
                check: '✓ Check',
                correct: '✅ Correct!',
                incorrect: '❌ Try again',
                typeAnswer: '❌ Type an answer',
                perfect: '🏆 Perfect!',
                great: '👍 Great!',
                good: '📖 Good',
                keep: '📚 Try again',
                easy: 'Easy',
                medium: 'Medium',
                hard: 'Hard',
                allLevels: 'All levels',
                prev: '◀ Prev',
                next: 'Next ▶',
                go: '🔍 Go',
                random: '🎲 Random',
                lessonPage: 'Lesson page',
                redirected: '🔀 Redirected to'
            }
        };
        let currentLang = localStorage.getItem('shfq-lang') || 'en';

        function t(k) { return t9n[currentLang]?.[k] || t9n['en'][k] || k; }

        function switchLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            localStorage.setItem('shfq-lang', currentLang);
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('langBtn').textContent = currentLang === 'ar' ? '🌍 English' : '🕌 العربية';
            if (currentQuestions.length) renderAllQuestions();
            showToast(currentLang === 'ar' ? '🕌 العربية' : '🌍 English', 'success');
        }

        function toggleTheme() {
            const cur = document.documentElement.getAttribute('data-theme');
            const next = cur === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('shfq-theme', next);
        }

        function showToast(msg, type) {
            const c = document.getElementById('toastContainer');
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.textContent = msg;
            c.appendChild(el);
            setTimeout(() => el.remove(), 2800);
        }

        // Non-lesson pages redirect map
        const redirectMap = { 1: 4, 2: 6, 3: 4, 5: 6, 40: 42, 41: 42 };
        const lessonPages = Object.keys(textbookDB).map(Number).filter(p => !redirectMap[p]).sort((a, b) => a - b);

        function getEffectivePage(p) {
            while (redirectMap[p]) p = redirectMap[p];
            return p;
        }

        function navigateToPage() {
            let p = parseInt(document.getElementById('pageInput').value);
            if (isNaN(p) || p < 1 || p > 83) { showToast('Enter 1–83', 'warning'); return; }
            const orig = p;
            p = getEffectivePage(p);
            if (p !== orig) {
                document.getElementById('pageInput').value = p;
                showToast(`${t('redirected')} page ${p}`, 'info');
            }
            document.getElementById('pageInput').value = p;
            generateAssessment(p);
        }

        function nextLessonPage() {
            let cur = parseInt(document.getElementById('pageInput').value) || 4;
            cur = getEffectivePage(cur);
            const idx = lessonPages.indexOf(cur);
            const next = idx >= 0 && idx < lessonPages.length - 1 ? lessonPages[idx + 1] : lessonPages[0];
            document.getElementById('pageInput').value = next;
            generateAssessment(next);
        }

        function prevLessonPage() {
            let cur = parseInt(document.getElementById('pageInput').value) || 4;
            cur = getEffectivePage(cur);
            const idx = lessonPages.indexOf(cur);
            const prev = idx > 0 ? lessonPages[idx - 1] : lessonPages[lessonPages.length - 1];
            document.getElementById('pageInput').value = prev;
            generateAssessment(prev);
        }

        function randomLessonPage() {
            const lp = lessonPages;
            const rp = lp[Math.floor(Math.random() * lp.length)];
            document.getElementById('pageInput').value = rp;
            generateAssessment(rp);
        }

        const textbookDB = {
            4: { unit: 1, section: 'Course Features', fullText: 'Conversation strategy helps you manage conversations. Strategy plus teaches I mean, Well, Anyway. Listening and speaking are practiced together.\nReading has texts from newspapers and magazines.\nWriting includes e‑mails, letters, articles.\nHelp notes cover punctuation and linking ideas.\nVocabulary notebook: fun activities to organize words.\nOn your own: learn vocabulary outside class.\nFree talk: free conversation with classmates.\nCheckpoints after every 3 units review grammar and vocabulary.', grammar: [], vocab: ['conversation strategy', 'vocabulary notebook', 'free talk', 'checkpoint'] },
            6: { unit: 1, section: 'Skills Overview', fullText: 'Unit 1: Listen – recognize hello/goodbye responses. Read – ID cards. Write – application. Vocab – greetings. Free talk – Meet a celebrity.\nUnit 2: Listen – Who\'s absent? Follow instructions. Read – classroom conversations. Write – location questions. Vocab – My things.\nUnit 3: Listen – friends descriptions. Read – family tree. Write – questions about people. Vocab – All in the family.\nUnit 4: Listen – What\'s the question? Teen habits. Read – Average American article. Write – e‑mail about classmate. Vocab – Verbs.', grammar: [], vocab: ['membership', 'application', 'family tree', 'daily activities'] },
            7: { unit: 1, section: 'Classroom Language', fullText: 'Getting help: What\'s the word for … in English? How do you spell …? Can you repeat that, please?\nWorking with a partner: I\'m ready. Are you ready? You go first. What do you have for number 1? Do you want to be A or B? Let\'s change roles.', grammar: [], vocab: ['spell', 'repeat', 'partner', 'roles'] },
            8: { unit: 1, section: 'Unit 1 – All About You', fullText: 'In Unit 1, you learn: use verb be with I, you, we; say hello/goodbye; say your name, phone number, e‑mail; ask How about you?; use Thanks. Match expressions with pictures.', grammar: ['I\'m', 'you\'re', 'we\'re'], vocab: ['hello', 'goodbye', 'thanks', 'phone number', 'e‑mail'] },
            9: { unit: 1, section: 'Hello & Good‑bye', fullText: 'Matt: Good morning, Sarah. How are you?\nSarah: Good. How are you, Matt?\nMatt: I\'m fine, thanks.\n\nMatt: Hello. I\'m Matt Lenski.\nEmily: Hi, I\'m Emily Kim. Nice to meet you.\nMatt: Nice to meet you.\n\nComplete: A: Hello. I\'m Chris. B: Hi. Nice to meet you. ___ Sam. A: Nice to meet ___.', grammar: ['I\'m', 'Nice to meet you'], vocab: ['Good morning', 'Hello', 'Hi', 'Nice to meet you', 'I\'m fine'] },
            10: { unit: 1, section: 'Responses', fullText: 'Emily: Good night. Matt: Good night. Have a good evening. Emily: Thank you. You too.\nSarah: Bye. See you tomorrow. Matt: Bye. See you.\n\nResponses:\n1. Bye. Have a good evening. → You too. Good night.\n2. Hi. How are you? → Good, thanks. / I\'m fine.\n3. Bye. See you later. → OK. See you later.\n5. Good‑bye. Have a nice day. → Thank you. / Thanks. You too.', grammar: [], vocab: ['Good night', 'Good evening', 'See you', 'Bye', 'Have a nice day', 'You too'] },
            11: { unit: 1, section: 'Names & Alphabet', fullText: 'First name, last name, middle name, nickname. Alphabet: Aa–Zz.\nA: What\'s your name? B: Catherine Ravelli.\nA: How do you spell Catherine? B: C‑A‑T‑H‑E‑R‑I‑N‑E.\nA: Thanks. And your last name? B: R‑A‑V‑E‑L‑L‑I.', grammar: [], vocab: ['first name', 'last name', 'spell', 'alphabet', 'nickname'] },
            12: { unit: 1, section: 'Verb be: I, you, we', fullText: 'Mr. Martin: Good morning. Are you here for an English class?\nCarmen: Yes, I am. I\'m Carmen Rivera. Mr. Martin: OK. You\'re in Room B.\nJenny: And I\'m Jenny. Mr. Martin: Are you Jenny Loo? Jenny: No, I\'m not. I\'m Jenny Lim. Am I in Room B too?\nMr. Martin: Yes…Wait — no, you\'re not. You\'re in Room G.\nJenny: Oh, no! Carmen, we\'re not in the same class!\n\nGrammar: I\'m (=I am) you\'re (=you are) we\'re (=we are)\nQuestions: Are you Jenny? → Yes, I am. / No, I\'m not.\nAm I in Room B? → Yes, you are. / No, you\'re not.\nAre we in the same class? → Yes, we are. / No, we\'re not.', grammar: ['I\'m', 'you\'re', 'we\'re', 'Are you…?', 'Am I…?'], vocab: ['class', 'Room', 'same class'] },
            13: { unit: 1, section: 'Numbers 0–10', fullText: 'Numbers: zero one two three four five six seven eight nine ten.\nReceptionist: Hi! Are you a member? Victor: No, I\'m just here for the day.\nReceptionist: What\'s your name? Victor: Victor Lopez.\nReceptionist: What\'s your phone number? Victor: It\'s 646‑555‑3048.\nReceptionist: And your e‑mail? Victor: vlopez6@cup.org.\nReceptionist: OK. So it\'s $10 for today. Here\'s your pass. Victor: Thanks.', grammar: [], vocab: ['zero', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine', 'ten', 'phone number', 'e‑mail'] },
            14: { unit: 1, section: 'What\'s…? It\'s…', fullText: 'What\'s your name? → My name\'s Victor Lopez.\nWhat\'s your e‑mail address? → It\'s vlopez6@cup.org.\nWhat\'s your phone number? → It\'s 646‑555‑3048.\nWhat\'s (=What is)  name\'s (=name is)  It\'s (=It is)\n\nMatch: 1. What\'s your teacher\'s name? → It\'s Ms. Gardino.\n2. What\'s your first name? → Rachel.\n3. What\'s your e‑mail? → yoyo3@cup.org.\nIn conversation: Phone is 6× more common than telephone.', grammar: ['What\'s', 'name\'s', 'It\'s'], vocab: ['teacher', 'first name', 'last name', 'e‑mail'] },
            15: { unit: 1, section: 'How about you?', fullText: 'Alicia: It\'s a beautiful day. Adam: Yeah, it is.\nAlicia: Are you here for the concert? Adam: Yeah, I am. How about you?\nAlicia: Yeah, me too. So, are you a student here? Adam: Yeah. How about you?\nAlicia: No, I\'m here on vacation.\n\nAdam uses How about you? to ask the same question back.\nComplete: Lora: Are you new here? Ying: Yes, I am. ___? Lora: Yes, me too.', grammar: ['How about you?'], vocab: ['concert', 'student', 'vacation', 'business'] },
            16: { unit: 1, section: 'Everyday Expressions', fullText: 'Formal ↔ Informal:\nYes ↔ Yeah | Thank you ↔ Thanks | Hello ↔ Hi\nHow are you? ↔ How are you doing?\nI\'m fine ↔ OK / Pretty good / Good\nGood‑bye ↔ Bye / See you / See you later\n\nYeah is 10× more common than yes.', grammar: [], vocab: ['Yeah', 'Thanks', 'Hi', 'How are you doing?', 'Pretty good', 'See you'] },
            17: { unit: 1, section: 'On Your Own', fullText: '1. Hello. 2. Good morning. 3. Hi. I\'m Helen. 4. How are you?\n5. Have a nice day. 6. See you tomorrow. 7. Have a good evening. 8. Good night.\nOn your own: Say hello and goodbye (in English!) to three people before next class.', grammar: [], vocab: ['Hello', 'Good morning', 'Good night', 'Have a nice day', 'See you tomorrow'] },
            18: { unit: 2, section: 'Unit 2 – In Class', fullText: 'In Unit 2, you learn: use verb be with he, she, they, this, these; talk about things and places in a classroom; ask for help in class; respond to Thank you and I\'m sorry.\nMatch: She\'s at work. They\'re at the library.', grammar: ['he\'s', 'she\'s', 'they\'re', 'this', 'these'], vocab: ['at work', 'at the library', 'classroom'] },
            19: { unit: 2, section: 'Where\'s Jun?', fullText: 'Miss Cass: Where\'s Jun? Is he here today? Ana: No, he\'s not. Maybe he\'s at work.\nMiss Cass: How about Laura? Ana: I don\'t know. I think she\'s sick.\nMiss Cass: Are Kim and Phong here? Ana: No, they\'re in the cafeteria.\nMiss Cass: They\'re late again. And Alan? Ana: He\'s over there. I think he\'s asleep!', grammar: ['Where\'s…?', 'he\'s not', 'she\'s', 'they\'re'], vocab: ['at work', 'sick', 'cafeteria', 'late', 'asleep'] },
            20: { unit: 2, section: 'He / She / They', fullText: 'Jun is at work. → He\'s at work.\nLaura\'s sick. → She\'s sick.\nKim and Phong are late. → They\'re late.\nNegative: He\'s not here. She\'s not in class. They\'re not here.\nQuestions: Is Jun here? → Yes, he is. / No, he\'s not.\nIs she sick? → Yes, she is. / No, she\'s not.\nAre they late? → Yes, they are. / No, they\'re not.\nPeople shorten is to \'s after names: Jun\'s at work.', grammar: ['He\'s', 'She\'s', 'They\'re', 'he\'s not', 'she\'s not', 'Is he…?', 'Is she…?', 'Are they…?'], vocab: ['at work', 'sick', 'cafeteria', 'at home', 'library'] },
            21: { unit: 2, section: 'Classroom Objects', fullText: 'a pen, an eraser, a dictionary, an MP3 player, a watch, glasses, keys, sunglasses.\nAndy: What\'s this? Bill: It\'s an MP3 player. It\'s my new toy.\nMichi: Is this your watch, Bill? Bill: Oh, yes, it is. Thanks.\nMichi: And are these your glasses? Bill: Yes, they are!\nScott: Are these your keys? Bill: Um… no, they\'re not. These are my keys right here.', grammar: ['a', 'an', 'this', 'these', 'What\'s this?', 'What are these?'], vocab: ['MP3 player', 'watch', 'glasses', 'keys', 'wallet', 'pen', 'dictionary'] },
            22: { unit: 2, section: 'This/These & Plurals', fullText: 'This is an MP3 player. What\'s this? → It\'s an MP3 player.\nThese are sunglasses. What are these? → They\'re sunglasses.\nIs this your watch? → Yes, it is. / No, it\'s not.\nAre these your keys? → Yes, they are. / No, they\'re not.\nPlurals: bag→bags, watch→watches, dictionary→dictionaries, key→keys.\nOnly plural: jeans, scissors, glasses, sunglasses.\n/s/ wallets, books  /z/ pens, keys  /ɪz/ watches, oranges', grammar: ['this', 'these', 'plural -s', 'plural -es', 'plural -ies', 'It\'s', 'They\'re'], vocab: ['jeans', 'scissors', 'sunglasses', 'watches', 'dictionaries'] },
            23: { unit: 2, section: 'Classroom Locations', fullText: 'What\'s on the wall? A clock, a map, and some posters.\nClassroom items: clock, map, posters, board, desk, wastebasket, closet, CD player, computer, TV, VCR, videos, students\' papers, teacher\'s desk.', grammar: [], vocab: ['clock', 'map', 'posters', 'board', 'desk', 'wastebasket', 'closet', 'CD player', 'computer'] },
            24: { unit: 2, section: 'Where? Possessives', fullText: 'Mrs. Evans: Where\'s the VCR? Paula: It\'s in the closet.\nMrs. Evans: Where are the videos? Paula: They\'re on the desk, under your coat.\nMrs. Evans: Where are the students\' homework papers? Paula: They\'re on the floor.\nMrs. Evans: What\'s this under my foot? Paula: It\'s Mario\'s homework.\nMrs. Evans: Where are my glasses? Paula: They\'re on your head!\n\nGrammar: Where\'s Mario\'s homework? → It\'s on the floor.\nWhere\'s the teacher\'s coat? → It\'s on the desk.\nWhere are the students\' papers? → They\'re on the floor.\nWhere\'s = Where is', grammar: ['Where\'s…?', 'Where are…?', 'possessive \'s', 'possessive s\''], vocab: ['VCR', 'closet', 'desk', 'floor', 'under', 'on', 'in front of'] },
            25: { unit: 2, section: 'Asking for Help', fullText: 'Ming‑wei: Excuse me, what\'s the word for this in English? Sonia: Highlighter.\nMing‑wei: Thanks. Uh… how do you spell it? Sonia: I don\'t know. Sorry.\nMing‑wei: That\'s OK. Thanks anyway. Can I borrow a pen, please?\nSonia: Sure. Here you go. Ming‑wei: Thank you. Sonia: You\'re welcome.\nMs. Larsen: Open your books to page 4.\nMing‑wei: Excuse me, can you repeat that, please? What page? Ms. Larsen: Sure. Page 4.', grammar: [], vocab: ['Excuse me', 'highlighter', 'borrow', 'repeat', 'eraser'] },
            26: { unit: 2, section: 'Responses', fullText: 'Thank you → You\'re welcome. Thanks → Sure.\nI\'m sorry. I don\'t know → That\'s OK. Thanks anyway.\n\nCircle: A: Can I borrow your pen? B: Sure. A: Thanks. B: You\'re welcome.\nA: You\'re late. B: I\'m sorry. A: That\'s OK.\nA: What\'s the word for this? B: I don\'t know. Sorry. A: That\'s OK. What about this? B: I don\'t know. A: OK. Thanks anyway.', grammar: [], vocab: ['You\'re welcome', 'Sure', 'That\'s OK', 'Thanks anyway', 'I\'m sorry'] },
            27: { unit: 2, section: 'On Your Own', fullText: 'Label the things on the desk. Make lists of your things.\nOn your own: Find a magazine with pictures of things. Label the pictures. How many words can you label?', grammar: [], vocab: ['label', 'magazine', 'pictures', 'desk'] },
            28: { unit: 3, section: 'Unit 3 – Favorite People', fullText: 'In Unit 3, you learn: use my, your, his, her, our, their; use verb be in information questions; talk about favorite celebrities, friends, family; show interest with Really?\nMatch: He\'s a singer. They\'re soccer players. She\'s an actor. He\'s an artist.', grammar: ['my', 'your', 'his', 'her', 'our', 'their'], vocab: ['singer', 'actor', 'artist', 'soccer player'] },
            29: { unit: 3, section: 'Celebrities', fullText: 'Sandra: I love these shows about celebrities. Who\'s that guy? Oh look – Sean Penn. He\'s so good‑looking. His new movie is great. Oh, and there\'s Norah Jones. She\'s my favorite singer. Her voice is amazing. And look – the Williams sisters, my favorite tennis players. Their matches are always exciting. You\'re a tennis fan, right? John? …John? Wake up!\n\nComplete: 1. Sean Penn is an actor. ___ movies are very good.\n2. Norah Jones is a singer. ___ new video is great.\n3. The Williams sisters are tennis players. ___ matches are always great.', grammar: ['his', 'her', 'their'], vocab: ['movie', 'voice', 'fan', 'exciting', 'good‑looking'] },
            30: { unit: 3, section: 'Possessive Adjectives', fullText: 'I\'m a fan → My favorite actor. You\'re a fan → Your favorite sport.\nHe\'s an actor → His new movie. She\'s a singer → Her voice.\nWe\'re Giants fans → Our favorite team. They\'re players → Their matches.\n\nCircle: A: I\'m / My a Sting fan. B: he\'s / his music is amazing.\nA: I\'m / My favorite band is Black Eyed Peas. B: they\'re / their new CD is out.\nWhat\'s you\'re / your favorite show? I\'m / My favorite show? Friends.', grammar: ['my', 'your', 'his', 'her', 'our', 'their'], vocab: ['fan', 'band', 'CD', 'show', 'team'] },
            31: { unit: 3, section: 'Describing People', fullText: 'smart, shy, friendly, outgoing, strict, lazy, interesting, fun, tired, busy, nice, quiet.\nDana: How\'s your new job? Are you busy? Tim: Yes. It\'s hard work. I\'m tired.\nDana: What are your co‑workers like? Are they nice? Tim: Yes, they\'re really friendly.\nDana: And is your boss OK? Tim: She is, yeah. She\'s nice. She\'s not very strict.\nDana: Good, because you\'re late for work.', grammar: ['What\'s…like?', 'Is he/she…?', 'Are they…?'], vocab: ['smart', 'shy', 'friendly', 'outgoing', 'strict', 'lazy', 'tired', 'busy'] },
            32: { unit: 3, section: 'Yes/No Questions', fullText: 'Am I late? → Yes, you are. / No, you\'re not. (You\'re not late.)\nAre you busy? → Yes, I am. / No, I\'m not. (I\'m not busy.)\nIs he tired? → Yes, he is. / No, he\'s not. (He\'s not tired.)\nIs she strict? → Yes, she is. / No, she\'s not. (My boss isn\'t strict.)\nIs it hard work? → Yes, it is. / No, it\'s not.\nAre they nice? → Yes, they are. / No, they\'re not. (My co‑workers aren\'t nice.)\nPeople use \'s not and \'re not after pronouns. Isn\'t/aren\'t follow nouns.', grammar: ['Am I…?', 'Are you…?', 'Is he…?', 'Is she…?', 'isn\'t', 'aren\'t', '\'s not', '\'re not'], vocab: ['shy', 'easy', 'strict', 'lazy', 'outgoing'] },
            33: { unit: 3, section: 'Family & Age', fullText: 'Akemi: Who\'s this? Erica: My grandma. And this is my grandpa. He\'s a nice man. He\'s seventy‑eight now.\nAkemi: Really? And how old is your grandmother? Erica: She\'s seventy‑two.\nAkemi: She\'s very pretty. What\'s her name? Erica: Angela.\nAkemi: That\'s a nice name. So, where are your grandparents from originally? Erica: They\'re from Texas.\n\nGrammar: How old are you? → Twenty‑three. Who\'s this? → It\'s my grandmother.\nWhere\'s she from? → She\'s from Texas.\nWhat\'s she like? → She\'s very smart.\nWhat are their names? → Linda and Carlos.', grammar: ['How old…?', 'Where…from?', 'Who\'s…?', 'What\'s…like?', 'What are…names?'], vocab: ['grandma', 'grandpa', 'grandmother', 'grandfather', 'parents', 'originally', 'pretty'] },
            34: { unit: 3, section: 'Showing Interest', fullText: 'Mark: This is a great photo. Who is it? Eve: It\'s a friend of mine – Natasha.\nMark: Oh? Where\'s she from? Eve: She\'s from London, but she\'s here in Miami now.\nMark: London? Wow. Is she a student here? Eve: No, she\'s an artist – a painter.\nMark: A painter? Really? What are her paintings like? Eve: They\'re wonderful. Look.\n\nMark shows interest by repeating words and asking questions.\n"London? Wow. Is she a student here?"\n\nComplete: A: My friend Gemma is a singer. B: A singer? ___? Is she in a band?', grammar: ['Really?'], vocab: ['photo', 'friend of mine', 'London', 'Miami', 'artist', 'painter', 'paintings'] },
            35: { unit: 3, section: 'Really?', fullText: 'Really? shows surprise or interest. Really is one of the top 50 words.\n\nA: Where are you from? B: San Diego. A: San Diego? Really? I\'m from Los Angeles.\nA: What\'s your name? B: Ryan. A: Really? My best friend\'s name is Ryan.\nA: Who\'s your best friend? B: Brittany. A: Really? What\'s she like? B: She\'s very nice.\n\nListening: Amy is a friend from the neighborhood. She\'s about ___ years old. Olivia is her ___.', grammar: ['Really?'], vocab: ['neighborhood', 'best friend', 'fun guy', 'around my age'] },
            36: { unit: 3, section: 'Family Tree', fullText: 'Complete the family tree using the words in the box.\nNow make your own family tree. Write notes about each person.\nOn your own: Make a photo album of your family and friends. Write sentences about them in English.', grammar: [], vocab: ['family tree', 'photo album', 'grandmother', 'grandfather', 'mother', 'father', 'sister', 'brother', 'aunt', 'uncle', 'cousin'] },
            37: { unit: 3, section: 'Checkpoint 1–3', fullText: 'Complete the conversation with words in the box.\nAngel: Hi, Carla. How are you? Carla: ___ fine, thanks. Is ___ your car?\nAngel: No. ___ my brother\'s car. ___ on vacation.\nCarla: So, where is ___ brother?\nAngel: He and ___ wife are in Miami. ___ family ___ from Miami.\n\nUnscramble: What is our teacher\'s full name? What\'s the school\'s phone number?\nIs our English class hard? Are the students in this class smart?\nWho\'s not in class today? Where are your books?', grammar: ['possessives', 'be verb'], vocab: ['classroom items', 'family', 'personality'] },
            38: { unit: 3, section: 'Expressions Review', fullText: 'Complete with: Thank you, Thanks anyway, Nice to meet you, Can I borrow your pen?, Really?, That\'s OK, You\'re welcome, Have a good day, How do you spell neighbor?\n\nAnna: Excuse me. Can I borrow your pen? Michel: Sure. Here you go. Anna: ___.\nMichel: You\'re welcome.\nAnna: Hmm. ___? Michel: Neighbor? I\'m sorry. I don\'t know.\nAnna: OK. ___. Michel: Wait. Here\'s my dictionary. Anna: Oh, thanks.\nMichel: ___. Anna: This is a French‑English dictionary.\nMichel: Yes. I\'m from France. Anna: France? ___? Michel: ___. Anna: By the way, I\'m Anna.\nMichel: I\'m Michel. ___.', grammar: [], vocab: ['Thank you', 'Thanks anyway', 'Nice to meet you', 'Really?', 'That\'s OK', 'You\'re welcome'] },
            39: { unit: 4, section: 'Unit 4 – Everyday Life', fullText: 'In Unit 4, you learn: use simple present statements, yes‑no questions, short answers; talk about daily and weekly routines; answer more than yes or no to be friendly; use Well to get time to think.\nFind these activities: do homework, work, exercise, watch TV.', grammar: ['simple present'], vocab: ['do homework', 'work', 'exercise', 'watch TV'] },
            42: { unit: 4, section: 'Simple Present', fullText: 'I eat breakfast. / I don\'t eat lunch.\nYou have coffee. / You don\'t have tea.\nHe listens to the radio. / He doesn\'t listen to CDs.\nShe watches TV. / She doesn\'t watch videos.\ndon\'t (=do not)  doesn\'t (=does not)\nVerb endings: get→gets, watch→watches, play→plays, study→studies, have→has, do→does.\n\nComplete: I don\'t like mornings. In my family, we ___ breakfast together.\nMy mother ___ (not/watch) TV. My father ___ coffee.', grammar: ['simple present', 'don\'t', 'doesn\'t', '‑s/‑es/‑ies', 'have→has'], vocab: ['breakfast', 'lunch', 'coffee', 'tea', 'radio', 'newspaper'] },
            43: { unit: 4, section: 'Weekly Routines', fullText: 'Activities: play sports, take lessons, check e‑mail, make phone calls, go shopping, do laundry.\nB: Do you play sports every week? A: Yes, I do. I play tennis on Saturdays.\nQuestionnaire: Do you play sports? Do you take classes? Do you check e‑mail on weekends?\nDo you make phone calls on Saturdays? ___ you ___ shopping on Sundays? ___ you ___ the laundry?', grammar: ['Do you…?'], vocab: ['play sports', 'take lessons', 'check e‑mail', 'go shopping', 'do laundry'] },
            44: { unit: 4, section: 'Yes/No Questions', fullText: 'Do you go to class in the evening? → Yes, I do. / No, I don\'t.\nDoes your mother work on weekends? → Yes, she does. / No, she doesn\'t.\nDo your friends make phone calls at night? → Yes, they do. / No, they don\'t.\n\nComplete: ___ you eat snacks every day? ___ your teacher work in the evening?\nSurvey: Find someone who belongs to a club, plays on a team, works on weekends, has breakfast in the car.', grammar: ['Do you…?', 'Does he/she…?', 'Yes, I do.', 'No, I don\'t.'], vocab: ['snacks', 'homework', 'dinner', 'club', 'team'] },
            45: { unit: 4, section: 'Saying More', fullText: 'Answer with more than yes or no to be friendly.\nA: Do you live around here? B: No, I live near the beach.\nA: Are you from here originally? B: No, I\'m from Rio.\nA: Do you have a part‑time job? B: Yeah, I work at a restaurant on weekends.\nA: Do you like sports? B: Yeah. Well, I play on a softball team.\nA: Do you have brothers and sisters? B: No, I\'m an only child.', grammar: [], vocab: ['live around here', 'part‑time job', 'only child', 'softball', 'restaurant'] },
            46: { unit: 4, section: 'Well', fullText: 'Start answers with Well to think. Well is a top 50 word.\nA: What are your neighbors like? B: Well, they\'re very noisy. They like loud music.\nA: Do you see your family a lot? B: Well, not really. They don\'t live around here.\nA: Do you study every day? B: Well, not every day. I go out with friends on weekends.', grammar: ['Well'], vocab: ['noisy', 'loud music', 'not really', 'go out'] },
            47: { unit: 4, section: 'Reading: Average American', fullText: 'In an average lifetime, an American works over 90,000 hours, walks 22,000 km (14,000 miles), and spends 3½ years eating. An American talks on the telephone for 2½ years. Americans sleep for 24 years and watch TV for 12 years. That\'s 36 years — about half a lifetime — in bed or on the couch!\n\nComplete: 1. ___ hours at work. 2. ___ years on the telephone. 3. ___ years in bed. 4. ___ years in front of TV.', grammar: ['simple present'], vocab: ['average', 'lifetime', '90,000', '24 years', '12 years', 'couch'] },
            48: { unit: 4, section: 'Teen Habits', fullText: 'Average teen: drinks 16 cans of soda/week, eats dinner at home 3×/week, spends 5 hrs/month online, watches TV 20 hrs/week.\nChristine: drinks about ___ cans, eats dinner at home ___ times, spends ___ hours online, watches TV ___ hours.\n\nWrite an e‑mail about your partner\'s average week. Use capital letters and periods.', grammar: ['simple present'], vocab: ['soda', 'online', 'exercise', 'cell phone', 'go out'] },
            49: { unit: 4, section: 'On Your Own', fullText: 'Label the pictures with verbs: read the newspaper. Draw your own activity pictures.\nWrite two things you do every day, in the afternoon, on Sundays, after breakfast, before bed.\nOn your own: Write labels for things you do every day. Put labels around your house.', grammar: [], vocab: ['read the newspaper', 'label', 'routine'] },
            50: { unit: 'WB', section: 'Workbook Title', fullText: 'ENG 101  General English  Workbook  Foundation Level 1', grammar: [], vocab: [] },
            51: { unit: 'WB', section: 'WB Contents', fullText: '1. All about you. 02  2. In class. 10  3. Favorite people. 18  4. Everyday life. 26', grammar: [], vocab: [] },
            52: { unit: 'WB', section: 'WB 1: Greetings', fullText: 'A: Hello. B: Hi. A: Hi, I\'m Ted. B: Hello, Ted. Nice to meet you.\nA: How are you? B: I\'m fine, thanks. A: Good‑bye. B: See you later.\nA: Good night. B: Bye. See you tomorrow. A: Hi. How are you? B: Good, thanks. How are you?', grammar: [], vocab: ['Hello', 'Hi', 'Good‑bye', 'See you later', 'Good night'] },

        let currentQuestions = [];
        let currentPageNum = null;

        function generateQuestionsForPage(pageNum) {
            const page = textbookDB[pageNum];
            if (!page) return [];
            const qs = [];
            const ft = page.fullText.toLowerCase();
            const snip = (kws, n = 2) => {
                const lines = page.fullText.split('\n').filter(l => l.trim().length > 6);
                for (const k of kws) { const f = lines.find(l => l.toLowerCase().includes(k.toLowerCase())); if (f) return f.trim(); }
                return lines.slice(0, n).join(' ').trim();
            };
            const mc = (correct, wrongs) => [correct, ...wrongs];
            const add = (text, context, hintOptions, answer, difficulty, type = 'grammar') => {
                qs.push({ id: qs.length + 1, text, context, hintOptions, answer, difficulty, type });
            };

            // === EASY questions (direct fill‑in from text) ===
            if (ft.includes("i'm") || ft.includes("i am")) add('Complete: "Hello. _____ Chris."', snip(["I'm", "Hello"]), mc("I'm", ["I", "You're"]), "I'm", 'easy', 'grammar');
            if (ft.includes("you're") || ft.includes("you are")) add('Complete: "_____ in Room B."', snip(["You're", "Room"]), mc("You're", ["You", "She's"]), "You're", 'easy', 'grammar');
            if (ft.includes("he's") && ft.includes("jun")) add('"Jun is at work." → "_____ at work."', snip(["He's", "Jun"]), mc("He's", ["He", "She's"]), "He's", 'easy', 'grammar');
            if (ft.includes("she's") && ft.includes("sick")) add('"Laura is sick." → "_____ sick."', snip(["She's", "sick"]), mc("She's", ["He's", "They're"]), "She's", 'easy', 'grammar');
            if (ft.includes("they're") && ft.includes("late")) add('"Kim and Phong are late." → "_____ late."', snip(["They're", "late"]), mc("They're", ["They", "We're"]), "They're", 'easy', 'grammar');
            if (ft.includes("we're") && ft.includes("same class")) add('"_____ in the same class." (We are)', snip(["We're", "same class"]), mc("We're", ["We", "They're"]), "We're", 'easy', 'grammar');
            if (ft.includes("what's") && ft.includes("name")) add('"_____ your name?"', snip(["What's", "name"]), mc("What's", ["What", "It's"]), "What's", 'easy', 'grammar');
            if (ft.includes("good morning")) add('Morning greeting?', snip(["Good morning"]), mc("Good morning", ["Good night", "Good evening"]), "Good morning", 'easy', 'vocabulary');
            if (ft.includes("good night")) add('Say before bed?', snip(["Good night"]), mc("Good night", ["Good morning", "Hello"]), "Good night", 'easy', 'vocabulary');
            if (ft.includes("nice to meet you")) add('First‑meeting expression?', snip(["Nice to meet you"]), mc("Nice to meet you", ["How are you?", "See you"]), "Nice to meet you", 'easy', 'vocabulary');
            if (ft.includes("see you")) add('Informal goodbye?', snip(["See you"]), mc("See you", ["Hello", "Good morning"]), "See you", 'easy', 'vocabulary');
            if (ft.includes("breakfast")) add('First meal of the day?', snip(["breakfast"]), mc("breakfast", ["lunch", "dinner"]), "breakfast", 'easy', 'vocabulary');

            // === MEDIUM questions (require choosing between similar options) ===
            if (ft.includes("are you") && ft.includes("?")) add('Question starter: "_____ you here for English?"', snip(["Are you", "class"]), mc("Are", ["Is", "Am"]), "Are", 'medium', 'grammar');
            if (ft.includes("is he") || ft.includes("is she")) add('"_____ she sick today?"', snip(["Is she", "sick"]), mc("Is", ["Are", "Am"]), "Is", 'medium', 'grammar');
            if (ft.includes("are they")) add('"_____ they in the cafeteria?"', snip(["Are they", "cafeteria"]), mc("Are", ["Is", "Am"]), "Are", 'medium', 'grammar');
            if (ft.includes("don't") && ft.includes("eat")) add('Negative: "I _____ eat lunch."', snip(["don't", "eat"]), mc("don't", ["doesn't", "not"]), "don't", 'medium', 'grammar');
            if (ft.includes("doesn't") && ft.includes("watch")) add('"She _____ watch TV."', snip(["doesn't", "watch"]), mc("doesn't", ["don't", "not"]), "doesn't", 'medium', 'grammar');
            if (ft.includes("his ") && ft.includes("movie")) add('Possessive (male): "_____ movies are good."', snip(["his", "movie"]), mc("His", ["Her", "Their"]), "His", 'medium', 'grammar');
            if (ft.includes("her ") && ft.includes("voice")) add('Possessive (female): "_____ voice is amazing."', snip(["her", "voice"]), mc("Her", ["His", "Their"]), "Her", 'medium', 'grammar');
            if (ft.includes("their ") && ft.includes("match")) add('Possessive (plural): "_____ matches are exciting."', snip(["their", "matches"]), mc("Their", ["His", "Her"]), "Their", 'medium', 'grammar');
            if (ft.includes("how about you")) add('Return a question: "I\'m fine. _____?"', snip(["How about you"]), mc("How about you?", ["How are you?", "What about you?"]), "How about you?", 'medium', 'grammar');
            if (ft.includes("where's") && ft.includes("vcr")) add('"_____ the VCR?" (Where is)', snip(["Where's", "VCR"]), mc("Where's", ["Where", "What's"]), "Where's", 'medium', 'grammar');
            if (ft.includes("an ") && ft.includes("mp3")) add('Article: "This is _____ MP3 player."', snip(["MP3"]), mc("an", ["a", "the"]), "an", 'medium', 'grammar');
            if (ft.includes("does") && (ft.includes("mother") || ft.includes("work"))) add('"_____ your mother work?"', snip(["Does", "mother"]), mc("Does", ["Do", "Is"]), "Does", 'medium', 'grammar');
            if (ft.includes("you're welcome")) add('Response to "Thank you"?', snip(["You're welcome"]), mc("You're welcome", ["That's OK", "Sorry"]), "You're welcome", 'medium', 'vocabulary');
            if (ft.includes("that's ok")) add('Response to "I\'m sorry"?', snip(["That's OK"]), mc("That's OK", ["You're welcome", "Thanks"]), "That's OK", 'medium', 'vocabulary');
            if (ft.includes("outgoing") || ft.includes("shy")) add('Adjective for a social person?', snip(["outgoing", "shy"]), mc("outgoing", ["shy", "lazy"]), "outgoing", 'medium', 'vocabulary');
            if (ft.includes("grandmother")) add('Your mother\'s mother?', snip(["grandmother"]), mc("grandmother", ["grandfather", "sister"]), "grandmother", 'medium', 'vocabulary');

            // === HARD questions (produce without hints, transform, apply rule) ===
            if (ft.includes("i'm") && ft.includes("not")) add('Make negative: "I\'m Carmen." → "I\'m _____ Carmen."', snip(["I'm not", "not"]), mc("not", ["no", "don't"]), "not", 'hard', 'grammar');
            if (ft.includes("don't") || ft.includes("doesn't")) {
                if (ft.includes("eat")) add('Rewrite: "I eat lunch." → Negative: "I _____ eat lunch."', snip(["don't eat"]), mc("don't", ["doesn't", "not"]), "don't", 'hard', 'grammar');
                if (ft.includes("watch")) add('"She watches TV." → Negative: "She _____ watch TV."', snip(["doesn't watch"]), mc("doesn't", ["don't", "not"]), "doesn't", 'hard', 'grammar');
            }
            if (ft.includes("well,") || ft.includes("well ")) add('What word starts a thinking pause? "_____, I\'m from Chicago."', snip(["Well"]), mc("Well", ["So", "But"]), "Well", 'hard', 'vocabulary');
            if (ft.includes("really?")) add('One word to show surprise?', snip(["Really?"]), mc("Really?", ["Yes", "No"]), "Really?", 'hard', 'vocabulary');
            if (ft.includes("90,000")) add('How many hours does an American work in a lifetime?', snip(["90,000"]), mc("90,000", ["9,000", "900,000"]), "90,000", 'hard', 'vocabulary');
            if (ft.includes("spell")) add('Ask for letters: "How do you _____ your name?"', snip(["spell"]), mc("spell", ["say", "write"]), "spell", 'hard', 'vocabulary');
            if (ft.includes("this ") && ft.includes("mp3")) add('Choose: "_____ is an MP3 player." (This/These)', snip(["This", "MP3"]), mc("This", ["These", "That"]), "This", 'hard', 'grammar');

            // Ensure at least 1 of each level
            if (!qs.some(q => q.difficulty === 'easy')) {
                const firstLine = page.fullText.split('\n').find(l => l.trim().length > 8) || '';
                const w = firstLine.split(/\s+/).find(x => x.length > 3) || 'English';
                add(`The text mentions: "${w}". Write this word.`, firstLine, mc(w, ['the', 'and']), w, 'easy', 'vocabulary');
            }
            if (!qs.some(q => q.difficulty === 'medium')) {
                const words = page.fullText.split(/\s+/).filter(w => w.length > 4);
                const tw = words[Math.floor(words.length / 2)] || 'English';
                add(`Find the word: "${tw}". Which unit topic does it match?`, snip([tw]), mc(tw, [words[1] || '', words[2] || '']), tw, 'medium', 'vocabulary');
            }
            if (!qs.some(q => q.difficulty === 'hard')) {
                add(`What is this page about? (one or two words)`, page.fullText.split('\n')[0] || '', mc(page.section.split('–')[0]?.trim() || 'English', ['Grammar', 'Vocabulary']), page.section.split('–')[0]?.trim() || 'English', 'hard', 'vocabulary');
            }

            return qs.slice(0, 9);
        }

        function renderAllQuestions() {
            const container = document.getElementById('questionsContainer');
            const levels = ['easy', 'medium', 'hard'];
            let html = '';
            const grouped = { easy: [], medium: [], hard: [] };
            currentQuestions.forEach(q => grouped[q.difficulty]?.push(q));

            for (const level of levels) {
                const qs = grouped[level];
                if (!qs || qs.length === 0) continue;
                const badgeClass = level === 'easy' ? 'badge-easy' : level === 'medium' ? 'badge-medium' : 'badge-hard';
                const levelLabel = t(level);
                html += `<div style="margin-bottom:1.5rem;"><div style="display:flex;align-items:center;gap:0.6rem;margin-bottom:0.8rem;"><span class="difficulty-badge ${badgeClass}">${levelLabel}</span><span style="font-size:0.8rem;color:var(--text-muted);">${qs.length} question${qs.length>1?'s':''}</span></div>`;
                qs.forEach((q, i) => {
                    const globalIdx = currentQuestions.indexOf(q);
                    const tagClass = q.type === 'grammar' ? 'tag-grammar' : 'tag-vocabulary';
                    html += `<div class="card question-card" id="qcard-${globalIdx}" style="margin-bottom:0.8rem;">
                        <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.4rem;">
                            <span class="question-number">${globalIdx+1}</span>
                            <span style="font-weight:600;flex:1;">${q.text}</span>
                            <span class="tag ${tagClass}">${t(q.type)}</span>
                        </div>
                        ${q.context?`<div class="context-snippet">📖 ${q.context}</div>`:''}
                        <div style="display:flex;flex-wrap:wrap;gap:0.5rem;align-items:center;">
                            <input type="text" id="answer-${globalIdx}" placeholder="Type answer..." class="answer-input" onkeydown="if(event.key==='Enter')checkAnswer(${globalIdx})">
                            <button class="btn btn-ghost" onclick="toggleHint(${globalIdx})">${t('hint')}</button>
                            <button class="btn btn-secondary" onclick="checkAnswer(${globalIdx})">${t('check')}</button>
                        </div>
                        <div class="hint-chips" id="hintChips-${globalIdx}">
                            ${q.hintOptions.map(opt=>`<span class="hint-chip" onclick="fillAnswer(${globalIdx},'${opt.replace(/'/g,"\\'")}')">${opt}</span>`).join('')}
                        </div>
                        <div class="answer-reveal" id="correctAnswer-${globalIdx}">✅ ${q.answer}</div>
                        <div class="feedback-msg" id="feedback-${globalIdx}"></div>
                    </div>`;
                });
                html += `</div>`;
            }
            container.innerHTML = html;
            document.getElementById('difficultySummary').textContent = `(${currentQuestions.length} questions across 3 levels)`;
        }

        function toggleHint(i) { document.getElementById(`hintChips-${i}`).classList.toggle('show'); }

        function fillAnswer(i, val) {
            document.getElementById(`answer-${i}`).value = val;
            document.getElementById(`hintChips-${i}`).classList.remove('show');
        }

        function checkAnswer(i) {
            const inp = document.getElementById(`answer-${i}`);
            const fb = document.getElementById(`feedback-${i}`);
            const card = document.getElementById(`qcard-${i}`);
            const ua = inp.value.trim().toLowerCase();
            if (!ua) { fb.className = 'feedback-msg incorrect show';
                fb.textContent = t('typeAnswer'); return; }
            const ca = currentQuestions[i].answer.toLowerCase().split(',').map(s => s.trim());
            let ok = false;
            for (const v of ca) { if (ua === v || (v.length > 3 && ua.includes(v)) || (ua.length > 3 && v.includes(ua))) { ok = true; break; } }
            if (ok) {
                fb.className = 'feedback-msg correct show';
                fb.textContent = t('correct');
                inp.classList.add('correct');
                inp.classList.remove('incorrect');
                card.style.borderColor = '#10b981';
            } else {
                fb.className = 'feedback-msg incorrect show';
                fb.textContent = t('incorrect');
                inp.classList.add('incorrect');
                inp.classList.remove('correct');
                card.style.borderColor = '#ef4444';
            }
            updateScore();
        }

        function checkAllAnswers() { currentQuestions.forEach((_, i) => { const inp = document.getElementById(`answer-${i}`); if (inp && inp.value.trim()) checkAnswer(i); }); }

        function showAllAnswers() { currentQuestions.forEach((_, i) => document.getElementById(`correctAnswer-${i}`).classList.add('show')); }

        function resetAnswers() {
            currentQuestions.forEach((_, i) => {
                const inp = document.getElementById(`answer-${i}`);
                if (inp) { inp.value = '';
                    inp.classList.remove('correct', 'incorrect'); }
                const fb = document.getElementById(`feedback-${i}`);
                if (fb) { fb.className = 'feedback-msg';
                    fb.textContent = ''; }
                const card = document.getElementById(`qcard-${i}`);
                if (card) card.style.borderColor = '';
                const rev = document.getElementById(`correctAnswer-${i}`);
                if (rev) rev.classList.remove('show');
            });
            updateScore();
        }

        function updateScore() {
            let correct = 0;
            const total = currentQuestions.length;
            currentQuestions.forEach((_, i) => { const fb = document.getElementById(`feedback-${i}`); if (fb && fb.classList.contains('correct')) correct++; });
            const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
            document.getElementById('scoreDisplay').textContent = pct + '%';
            document.getElementById('progressFill').style.width = pct + '%';
            const ring = document.getElementById('scoreRing');
            ring.textContent = pct + '%';
            if (pct >= 80) ring.style.borderColor = '#10b981';
            else if (pct >= 50) ring.style.borderColor = '#f59e0b';
            else ring.style.borderColor = 'var(--border-light)';
            let stars = '';
            if (pct === 100) stars = '⭐⭐⭐⭐⭐';
            else if (pct >= 80) stars = '⭐⭐⭐⭐';
            else if (pct >= 60) stars = '⭐⭐⭐';
            else if (pct >= 40) stars = '⭐⭐';
            else if (pct > 0) stars = '⭐';
            document.getElementById('starsDisplay').textContent = stars;
            const msgs = { 100: 'perfect', 75: 'great', 50: 'good' };
            const m = pct >= 100 ? 'perfect' : pct >= 75 ? 'great' : pct >= 50 ? 'good' : pct > 0 ? 'keep' : '';
            document.getElementById('scoreMessage').textContent = m ? t(m) : '';
        }

        function generateAssessment(pageNum) {
            const page = textbookDB[pageNum];
            if (!page) { showToast('Page not found', 'error'); return; }
            currentPageNum = pageNum;
            currentQuestions = generateQuestionsForPage(pageNum);
            document.getElementById('pageContentDisplay').innerHTML = page.fullText.replace(/\n/g, '<br>');
            document.getElementById('pageContentDisplay').scrollTop = 0;
            document.getElementById('pageStatus').textContent = `${t('lessonPage')} ${pageNum} · Unit ${page.unit}`;
            document.getElementById('resultsPanel').style.display = 'block';
            document.getElementById('scoreRing').textContent = '0%';
            document.getElementById('scoreRing').style.borderColor = 'var(--border-light)';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('starsDisplay').textContent = '';
            document.getElementById('scoreMessage').textContent = '';
            if (currentQuestions.length === 0) {
                document.getElementById('questionsContainer').innerHTML = '<p style="text-align:center;color:var(--text-muted);">No questions for this page.</p>';
            } else {
                renderAllQuestions();
            }
            document.getElementById('pageContentDisplay').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        document.getElementById('pageInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') navigateToPage(); });
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('langBtn').textContent = currentLang === 'ar' ? '🌍 English' : '🕌 العربية';
            generateAssessment(9);
        });
    </script>
</body>
</html>
